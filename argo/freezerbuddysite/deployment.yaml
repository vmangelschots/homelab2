apiVersion: apps/v1
kind: Deployment
metadata:
  name: fbsite 
  namespace: fbsite 
  labels:
    app: broek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fbsite 
  template:
    metadata:
      labels:
        app: fbsite 
    spec:
      containers:
        - name: fbsite 
          image: ghcr.io/vmangelschots/freezerbuddysite:latest

          ports:
            - containerPort: 80 
              name: http
          env:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: fbsite-svc
  namespace: fbsite
  labels:
    app: fbsite 
spec:
  type: ClusterIP
  selector:
    app: fbsite 
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fbsite 
  namespace: fbsite 
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - deepchill.eu
      secretName: fbsite-tls
  rules:
    - host: deepchill.eu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fbsite-svc
                port:
                  number: 80
