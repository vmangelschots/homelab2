---
# PostgreSQL Database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plausible-postgres
  namespace: plausible
  labels:
    app: plausible-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plausible-postgres
  template:
    metadata:
      labels:
        app: plausible-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: plausible
        - name: POSTGRES_USER
          value: plausible
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: plausible-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - plausible
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - plausible
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: plausible-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: plausible-postgres
  namespace: plausible
spec:
  selector:
    app: plausible-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  type: ClusterIP
