apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventree-server
  namespace: inventree
  labels:
    app.kubernetes.io/name: inventree-server
    app.kubernetes.io/instance: inventree
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventree-server
  template:
    metadata:
      labels:
        app: inventree-server
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL ready."
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-svc 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis ready."
      containers:
        - name: inventree-server
          image: inventree/inventree:stable
          imagePullPolicy: Always
          command:
            - invoke
            - server
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: INVENTREE_DB_ENGINE
              value: postgresql
            - name: INVENTREE_DB_NAME
              value: inventree
            - name: INVENTREE_DB_USER
              value: inventree
            - name: INVENTREE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: POSTGRES_PASSWORD
            - name: INVENTREE_DB_HOST
              value: postgres-svc
            - name: INVENTREE_DB_PORT
              value: "5432"
            - name: INVENTREE_CACHE_HOST
              value: redis-svc
            - name: INVENTREE_CACHE_PORT
              value: "6379"
            - name: INVENTREE_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: REDIS_PASSWORD
            - name: INVENTREE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: SECRET_KEY
            - name: INVENTREE_MEDIA_ROOT
              value: /home/inventree/data/media
            - name: INVENTREE_STATIC_ROOT
              value: /home/inventree/data/static
            - name: INVENTREE_BASE_URL
              value: https://inventree.mangelschots.org
            - name: INVENTREE_ALLOWED_HOSTS
              value: inventree.mangelschots.org
            - name: INVENTREE_CORS_ORIGIN_ALLOW_ALL
              value: "False"
            - name: INVENTREE_WEB_ADDR
              value: "0.0.0.0"
            - name: INVENTREE_WEB_PORT
              value: "8000"
          volumeMounts:
            - name: inventree-data
              mountPath: /home/inventree/data
          readinessProbe:
            httpGet:
              path: /api/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: inventree-data
          persistentVolumeClaim:
            claimName: inventree-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventree-worker
  namespace: inventree
  labels:
    app.kubernetes.io/name: inventree-worker
    app.kubernetes.io/instance: inventree
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventree-worker
  template:
    metadata:
      labels:
        app: inventree-worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL ready."
      containers:
        - name: inventree-worker
          image: inventree/inventree:stable
          imagePullPolicy: Always
          command:
            - invoke
            - worker
          env:
            - name: INVENTREE_DB_ENGINE
              value: postgresql
            - name: INVENTREE_DB_NAME
              value: inventree
            - name: INVENTREE_DB_USER
              value: inventree
            - name: INVENTREE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: POSTGRES_PASSWORD
            - name: INVENTREE_DB_HOST
              value: postgres-svc
            - name: INVENTREE_DB_PORT
              value: "5432"
            - name: INVENTREE_CACHE_HOST
              value: redis-svc
            - name: INVENTREE_CACHE_PORT
              value: "6379"
            - name: INVENTREE_CACHE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: REDIS_PASSWORD
            - name: INVENTREE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: inventree-secret
                  key: SECRET_KEY
            - name: INVENTREE_MEDIA_ROOT
              value: /home/inventree/data/media
            - name: INVENTREE_STATIC_ROOT
              value: /home/inventree/data/static
          volumeMounts:
            - name: inventree-data
              mountPath: /home/inventree/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: inventree-data
          persistentVolumeClaim:
            claimName: inventree-data
---
apiVersion: v1
kind: Service
metadata:
  name: inventree-svc
  namespace: inventree
  labels:
    app.kubernetes.io/name: inventree
spec:
  type: ClusterIP
  selector:
    app: inventree-server
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inventree
  namespace: inventree
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns01
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - inventree.mangelschots.org
      secretName: inventree-mangelschots-org-tls
  rules:
    - host: inventree.mangelschots.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inventree-svc
                port:
                  number: 8000
