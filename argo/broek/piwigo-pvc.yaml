apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: piwigo-data
  namespace: broek
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: nfs-retain
