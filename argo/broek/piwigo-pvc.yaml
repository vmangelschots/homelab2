---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: piwigo-mysql-data
  namespace: broek
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-retain
